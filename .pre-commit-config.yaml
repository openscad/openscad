---
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          # Regression goldens under tests/regression/ are byte-faithful
          # captures of generator output (POV, STL, OBJ, ...) and may
          # legitimately contain trailing whitespace or no final
          # newline; e.g. the POV exporter emits "polygon { 5, " with a
          # trailing space, and binary STL has no terminating newline.
          # The whitespace and EOF fixers must not touch those files,
          # otherwise they desynchronize from the freshly-generated
          # output the tests compare against.
          - id: trailing-whitespace
            exclude: ^tests/regression/
          - id: end-of-file-fixer
            exclude: ^tests/regression/
          - id: check-yaml
          - id: detect-private-key
    - repo: https://github.com/pre-commit/mirrors-clang-format
      rev: "v22.1.5"
      hooks:
          - id: clang-format
            args: ["--style=file"]
    - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
      rev: v9.26.0
      hooks:
          - id: commitlint
            stages: [commit-msg]
            additional_dependencies: ["@commitlint/config-conventional@21.1.0"]
    - repo: https://github.com/DavidAnson/markdownlint-cli2
      rev: v0.22.1
      hooks:
          # Validate Markdown files for style and correctness. Exclude the
          # changelog, which is autogenerated by release-please and doesn't
          # follow the same style rules as hand-authored Markdown.
          - id: markdownlint-cli2
            exclude: ^CHANGELOG\.md$
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.19
      hooks:
          # Validate Python stub files programmatically instead of
          # eyeballing them. Scoped to the stubs tree so that the rest of
          # the repository (tests, scripts, examples) is not touched by
          # this hook yet; that is a separate decision.
          - id: ruff
            name: ruff (python stubs)
            files: ^libraries/python/stubs/.*\.pyi$
            args: ["--select", "F401,F811,F821"]
    - repo: https://github.com/RodrigoGonzalez/check-mkdocs
      rev: v1.2.0
      hooks:
          - id: check-mkdocs
            name: check-mkdocs
            args: ["--config", "web/mkdocs.yml"]
            files: ^web/
    - repo: https://github.com/rhysd/actionlint
      rev: v1.7.12
      hooks:
          # Lints GitHub Actions workflow files: schema validation,
          # expression syntax, pinned-action checks, etc. When
          # shellcheck is on PATH (GitHub-hosted runners ship it in
          # the base image), actionlint also checks workflow run:
          # blocks for SC2086, SC2012, SC2162, etc.
          - id: actionlint
    - repo: https://github.com/shellcheck-py/shellcheck-py
      rev: v0.11.0.1
      hooks:
          # Lints shell scripts (anything with a shell shebang or `*.sh`)
          # for correctness, portability, and security pitfalls. Bundles
          # the shellcheck binary as a Python wheel so contributors don't
          # need a system install.
          #
          # `--severity=warning` keeps real issues (SC2086 unquoted
          # expansion, SC2155 mask-return-value, etc.) and skips the
          # long-tail style nags we'd otherwise have to triage one by
          # one. Submodules are upstream code we don't own; tests/data
          # has intentionally-weird shell test fixtures (cascade*.sh
          # etc.) that exist to exercise edge cases.
          - id: shellcheck
            args: ["--severity=warning"]
            exclude: ^(submodules|tests/data)/
    - repo: https://github.com/zizmorcore/zizmor-pre-commit
      rev: v1.26.1
      hooks:
          # Security audits for GitHub Actions workflows and composite
          # actions. Catches template/expression injection from
          # attacker-controlled contexts (PR titles, issue bodies, ...),
          # over-broad permissions, dangerous triggers, etc.
          #
          # Gated at --min-severity=high so the hook only fails on
          # hard errors. The PR-scoped CI runner (pre-commit.yml)
          # runs this same hook with the same threshold, so
          # warning/info-level findings (template injection from
          # `matrix.*`, hash-pinning of third-party actions,
          # `superfluous-actions`, etc.) don't block merges either.
          # Long-tail cleanup is tracked in #613.
          - id: zizmor
            args: ["--no-progress", "--min-severity=high"]
