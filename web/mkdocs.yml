site_name: PythonSCAD
site_url: https://www.pythonscad.org/
repo_url: https://github.com/pythonscad/pythonscad/
repo_name: pythonscad/pythonscad
theme:
  logo: pictures/pythonscad-128.png
  name: material
  highlightjs: true
  features:
    - navigation.footer
    - navigation.instant
    - content.tabs.link
    - content.code.copy
    - content.code.select
  icon:
    repo: fontawesome/brands/github

  font:
    code: Intel One Mono

  palette:
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Get started: get_started.md
  - Downloads: downloads.md
  - Installation: installation.md
  - Development:
      - Upstream Sync: development/upstream-sync.md
  - Building: building.md
  - Tutorial:
      - Getting Started: tutorial/getting_started.md
      - Combining Objects: tutorial/combining_objects.md
      - Positioning Objects: tutorial/positioning_objects.md
      - Python Specialities: tutorial/python_specialities.md
      - OpenSCAD together with Python: tutorial/python_together.md
      - New Functions in pythonscad: tutorial/python_new.md
      # - New File types in pythonscad: tutorial/python_newformats.md
  - Reference:
      - 3D Primitives: reference/primitives3d.md
      - 2D Primitives: reference/primitives2d.md
      - 1D Primitives: reference/primitives1d.md
      - Transformations: reference/transformations.md
      - Boolean Operations: reference/booleans.md
      - Extrusions: reference/extrusions.md
      - Operators: reference/operators.md
      - Object Properties: reference/properties.md
      - Object Model: reference/object_model.md
      - Display and Export: reference/display.md
      - I/O and Integration: reference/io.md
      - Math Functions: reference/math.md
      - Special Variables: reference/variables.md
      - Customizer: reference/customizer.md
      - Surface: reference/surface.md
      - Sheet: reference/sheet.md
      - F-Rep / libfive: reference/frep.md
      - Pull: reference/pull.md
      - Wrap: reference/wrap.md
      - Align and Handles: reference/align.md
      - Roof: reference/roof.md
      - Fillet: reference/fillet.md
      - Mesh Operations: reference/repair.md
      - GUI and Utility: reference/gui.md
  - Examples: examples.md
  - Cheat-Sheet: cheatsheet.md
  - Resources: resources.md
  - Jupyter Setup: jupyter.md
  - Contact: contact.md

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
