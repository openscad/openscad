# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "takanome-dev/assign-issue-action"
        versions: ["<2.4"]

  # Bump hook revs in `.pre-commit-config.yaml` (and any hook
  # `additional_dependencies`, e.g. commitlint's npm packages).
  # Replaces the former `pre-commit-autoupdate.yml` scheduled
  # workflow now that Dependabot supports the `pre-commit` ecosystem.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pre-commit-hooks:
        patterns:
          - "*"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      include: "scope"

  # Python dependencies are declared in pyproject.toml and locked in
  # uv.lock. Dependabot updates the lockfile (and constraints when
  # needed) for runtime bundle, PyPI wheel build tooling, and docs.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      runtime-python-deps:
        patterns:
          - "ipython"
      python-wheel-build:
        patterns:
          - "build"
          - "cibuildwheel"
          - "auditwheel"
          - "delocate"
          - "delvewheel"
      docs-site:
        patterns:
          - "mkdocs"
          - "mkdocs-material"
          - "pymdown-extensions"
          - "pygments"
          - "click"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      include: "scope"

  - package-ecosystem: "uv"
    directory: "/.github/ci/openscad-coverage"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      include: "scope"

  - package-ecosystem: "uv"
    directory: "/libraries/python/stubs"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      include: "scope"

  # WASM sysroot: Emscripten base image (FROM/ARG tags) in docker/wasm/sysroot.dockerfile.
  - package-ecosystem: "docker"
    directory: "/docker/wasm"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      include: "scope"

  # WASM sysroot: pinned pip build tools copied into sysroot.dockerfile.
  - package-ecosystem: "pip"
    directory: "/docker/wasm"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      include: "scope"

  # wasm-test notebook: vendored three.js ES modules (vendor/three.module.min.js
  # + vendor/three.core.min.js via npm postinstall).
  - package-ecosystem: "npm"
    directory: "/wasm-test"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
