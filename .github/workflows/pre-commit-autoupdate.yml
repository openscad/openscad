name: pre-commit autoupdate

# Dependabot does not natively support .pre-commit-config.yaml
# (dependabot-core#1524), so we use a scheduled workflow instead.
# It runs `pre-commit autoupdate` weekly and opens a PR if any hook
# revisions changed. The PR goes through the normal `pull_request`
# CI: `commitlint.yml`, `pre-commit.yml`, `linux-tests.yml`,
# `macos-tests.yml`, `windows.yml`, `pip-build-and-test.yml`,
# `beautify.yml`, `code-tidy.yml`. The release-only build
# workflows (`build-appimage.yml`, `build-debian-packages.yml`,
# `build-rpm-packages.yml`, `build-windows-native.yml`,
# `build-macos-release.yml`, `deploy-website.yml`,
# `publish-to-pypi.yml`) trigger on `release` /
# `workflow_dispatch` only, so an autoupdate PR does *not*
# exercise them â€” review the diff carefully if it touches a hook
# whose only meaningful target lives in the release pipeline.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Serialize autoupdate runs across triggers. Because the workflow
# force-pushes a single shared branch (`ci/pre-commit-autoupdate`),
# overlapping runs from `schedule` + `workflow_dispatch` could race
# at the push step and leave the open PR pointing at stale revs.
# Queue rather than cancel so each manual dispatch still produces a
# refresh attempt instead of silently being dropped in favour of the
# scheduled run.
concurrency:
  group: pre-commit-autoupdate
  cancel-in-progress: false

# No top-level write permissions: we authenticate via the bot account
# PAT (`secrets.RELEASE_TOKEN`) instead of `GITHUB_TOKEN`, so we don't
# need to expand the default `GITHUB_TOKEN` scope. The PAT is required
# because pushes/PRs created with `GITHUB_TOKEN` cannot trigger other
# workflows (this is GitHub's documented anti-recursion behaviour),
# which would mean the autoupdate PR opens with no commitlint /
# pre-commit / build runs and silently merges. The same `RELEASE_TOKEN`
# is already used by `release-please.yml` and `publish-release.yml`
# for exactly this reason.
permissions:
  contents: read

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Pin the checkout to the repository's default branch.
          # `schedule` events always run on the default branch, but
          # `workflow_dispatch` can be triggered from any ref â€” without
          # this pin, a manual run from a feature branch would carry
          # that branch's unrelated commits into the autoupdate PR.
          ref: ${{ github.event.repository.default_branch }}
          # Bot account PAT, not GITHUB_TOKEN â€” see the workflow-level
          # comment above for the rationale. zizmor's `artipacked` audit
          # flags any persisted credentials here; the suppression is
          # appropriate because the token never leaves the runner â€”
          # it's only used to push the autoupdate branch and open the
          # PR. Tracked in #613.
          token: ${{ secrets.RELEASE_TOKEN }} # zizmor: ignore[artipacked] tracked in #613

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit autoupdate
        run: pre-commit autoupdate

      - name: Capture full --all-files snapshot for the PR description
        # CI's `pre-commit.yml` safety net runs with a `SKIP=`
        # deny-list (`shellcheck`, `clang-format`,
        # `markdownlint-cli2`, `trailing-whitespace`,
        # `end-of-file-fixer`) because those hooks have an
        # inherited-OpenSCAD `--all-files` backlog tracked in #613.
        # That means an autoupdate PR which bumps one of those
        # hooks in a breaking way wouldn't fail any CI gate â€” the
        # diff-scoped step has no targets (it's a config-only
        # change) and the safety-net step skips it.
        #
        # Capture the *full* `--all-files` output here (no `SKIP`,
        # `|| true` so a failure doesn't abort the workflow) while
        # we still know which hook revs `autoupdate` just picked,
        # and embed it in the PR body below. A maintainer reviewing
        # the autoupdate diff then has a concrete snapshot of what
        # the new revs produce against the whole tree, and can
        # compare it against the equivalent run on master to spot
        # regressions the CI gate can't catch.
        run: |
          if git diff --quiet .pre-commit-config.yaml; then
            echo "no autoupdate diff; nothing to snapshot" \
              > /tmp/precommit-snapshot.md
            exit 0
          fi
          {
            echo "<details>"
            echo "<summary><strong>Full <code>pre-commit run --all-files</code> snapshot under the new hook revs</strong> (no <code>SKIP</code> deny-list applied)</summary>"
            echo
            echo '```'
            pre-commit run --all-files --color=never 2>&1 || true
            echo '```'
            echo
            echo "</details>"
          } > /tmp/precommit-snapshot.md

      - name: Open PR if anything changed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if git diff --quiet .pre-commit-config.yaml; then
            echo "No hook updates available."
            exit 0
          fi

          # Stable branch name (no date) so any same-day rerun
          # (manual rerun, retry after failure, or a still-open
          # previous autoupdate PR getting refreshed) just updates
          # the existing branch instead of failing with
          # `non-fast-forward` / `branch already exists`. The PR
          # title/body advertise the autoupdate as of "today".
          BRANCH="ci/pre-commit-autoupdate"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "$BRANCH"
          git add .pre-commit-config.yaml
          git commit -m "build(deps): pre-commit autoupdate"
          git push --force origin "$BRANCH"

          # Build the PR body in a tmp file so we can pipe a
          # multi-paragraph markdown blurb plus the captured
          # `--all-files` snapshot through `gh pr create
          # --body-file` (avoids quoting headaches with multi-line
          # markdown in `--body`).
          {
            # shellcheck disable=SC2016 # backticks below are literal markdown, not command substitution
            cat <<'EOF'
          Automated weekly bump of pre-commit hook revs via `pre-commit autoupdate`. Review the diff and merge if CI is green.

          ## Coverage note

          `pre-commit.yml`'s safety net runs with a `SKIP=` deny-list for hooks that have an inherited-OpenSCAD `--all-files` backlog (`shellcheck`, `clang-format`, `markdownlint-cli2`, `trailing-whitespace`, `end-of-file-fixer`; tracked in #613). The snapshot below was produced *without* that deny-list applied, so a breaking autoupdate to one of the deferred hooks shows up here even though it wouldn't show up as a CI failure on this PR.

          EOF
            cat /tmp/precommit-snapshot.md
          } > /tmp/pr-body.md

          # If a PR is already open against this branch, the force-
          # push above already updated its head; refresh the body
          # with the new snapshot and leave a comment so the
          # maintainers can see the rerun timestamp. Otherwise open
          # a fresh PR.
          existing=$(gh pr list --head "$BRANCH" --state open \
                       --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --body-file /tmp/pr-body.md
            gh pr comment "$existing" --body \
              "Refreshed branch and PR body from a new \`pre-commit autoupdate\` run on $(date -u +%Y-%m-%d)."
          else
            gh pr create \
              --title 'build(deps): pre-commit autoupdate' \
              --body-file /tmp/pr-body.md \
              --label 'dependencies'
          fi
