name: Build Windows Native Package

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Release tag to upload to (leave empty for test build)'
        required: false
        default: ''
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled'
        required: false
        default: false

permissions:
  contents: read

jobs:
  build-package:
    runs-on: windows-latest
    permissions:
      contents: write
    name: Windows Native Package (Qt6)
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          # Build from the release tag when uploading to a release (avoids -dirty in filenames)
          ref: ${{ github.event.release.tag_name || github.event.inputs.upload_to_release || github.ref }}
          persist-credentials: false

      - name: Configure git (disable line-ending conversion for accurate dirty check)
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.safecrlf false

      - name: Fetch tags for version detection
        shell: bash
        run: |
          git fetch --unshallow --tags || git fetch --tags
          git describe --tags --always --dirty

      - name: Set version for release build (avoid -dirty in package filenames)
        if: github.event.release.tag_name != '' || github.event.inputs.upload_to_release != ''
        shell: bash
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          UPLOAD_TO_RELEASE: ${{ github.event.inputs.upload_to_release }}
        run: |
          TAG="${RELEASE_TAG_NAME:-$UPLOAD_TO_RELEASE}"
          # Strip leading 'v' for CMake (e.g. v0.6.0 -> 0.6.0)
          OPENSCAD_VERSION="${TAG#v}"
          echo "OPENSCAD_VERSION=$OPENSCAD_VERSION" >> "$GITHUB_ENV"
          echo "Using release version for package name: $OPENSCAD_VERSION"

      - name: Derive MSIX version (4-part numeric required by makeappx)
        id: msix-version
        shell: bash
        run: |
          # MSIX Identity Version must be X.Y.Z.W with only numeric components.
          # OPENSCAD_VERSION is set to e.g. "0.20.0" on release builds and is
          # empty on snapshot/test builds (version comes from git describe at
          # cmake time). Fall back to "0.0.0.0" for non-release runs where an
          # exact version is not available yet.
          VERSION="${OPENSCAD_VERSION:-0.0.0}"
          # Strip any pre-release/build suffix (e.g. "0.20.0-rc1" -> "0.20.0")
          VERSION="${VERSION%%-*}"
          VERSION="${VERSION%%+*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MSIX_VERSION="${MAJOR:-0}.${MINOR:-0}.${PATCH:-0}.0"
          echo "version=$MSIX_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using MSIX version: $MSIX_VERSION"

      - name: Setup (detached) tmate session if enabled
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          detached: true

      - name: Calculate PACBOY_PACKAGES
        shell: bash
        run: |
          python3 ./scripts/get-dependencies.py --distro msys2 --profile pythonscad-qt6 --output-env "$GITHUB_ENV" --env-var PACBOY_PACKAGES

      - name: Setup MSYS2 Environment
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: libxml2
          # Add nsis for CPack installer generation
          pacboy: ${{ env.PACBOY_PACKAGES }} nsis:p

      - name: Detect Python version
        id: detect-python
        run: |
          PYTHON_VERSION=$(python --version | cut -d' ' -f2 | cut -d'.' -f1,2)
          echo "Python version detected: $PYTHON_VERSION"
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_ENV

          PYTHON_FULL_VERSION=$(python --version | cut -d' ' -f2)
          echo "Full Python version: $PYTHON_FULL_VERSION"
          echo "PYTHON_FULL_VERSION=$PYTHON_FULL_VERSION" >> $GITHUB_ENV

      - name: Install Mesa
        uses: ssciwr/setup-mesa-dist-win@v3
        with:
          version: '22.1.7'
          build-type: 'release-mingw'

      - name: Build PythonSCAD
        run: |
          mkdir build && cd build
          # Use explicit version for release builds so package filenames never get -dirty
          EXTRA_CMAKE=()
          if [ -n "${OPENSCAD_VERSION:-}" ]; then
            EXTRA_CMAKE+=("-DOPENSCAD_VERSION=$OPENSCAD_VERSION")
          fi
          cmake .. -G"Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEXPERIMENTAL=ON \
            -DSNAPSHOT=ON \
            -DUSE_QT6=ON \
            -DENABLE_PYTHON=ON \
            -DENABLE_LIBFIVE=ON \
            -DPORTABLE_BINARY=ON \
            -DENABLE_TESTS=OFF \
            -DPACKAGE_ARCH=windows-x86-64 \
            "${EXTRA_CMAKE[@]}"
          cmake --build . -j4

      - name: Install MSYS2 psutil and uv for IPython 9 bundle
        run: |
          pacboy -S --noconfirm --needed python-psutil:p uv:p

      - name: Bundle runtime Python deps (IPython) into build tree
        run: |
          # Bundle into ${CMAKE_BINARY_DIR}/pythonscad-bundled-py BEFORE
          # `cmake --install` runs. The CMakeLists.txt install rule is
          #   install(DIRECTORY ${CMAKE_BINARY_DIR}/pythonscad-bundled-py/
          #           DESTINATION lib/pythonscad-bundled-py OPTIONAL)
          # so the contents land at lib/pythonscad-bundled-py in the
          # CPack ZIP / NSIS installer, which is exactly what
          # `bundledFallbackPaths` in src/python/pyopenscad.cc searches
          # at runtime. The earlier flow bundled into build/staging/
          # *after* `cmake --install`, but CPack regenerates its own
          # staging from the install rules and ignored that directory --
          # so the bundle silently failed to ship in the artifact.
          BUNDLE_DEST="build/pythonscad-bundled-py"
          chmod +x ./scripts/bundle-runtime-python.sh
          BUNDLE_PY_AUTO_INSTALL_PIP_LICENSES=1 \
            ./scripts/bundle-runtime-python.sh "${BUNDLE_DEST}" --python python

      - name: Install to staging directory
        run: |
          cd build
          cmake --install . --prefix=staging

      - name: List installed files
        run: |
          cd build/staging
          echo "=== Root files ==="
          ls -lh *.dll *.conf 2>/dev/null | head -30 || echo "No root DLLs/conf found"
          echo "Total root DLLs: $(ls -1 *.dll 2>/dev/null | wc -l)"
          echo ""
          echo "=== qt.conf contents ==="
          cat qt.conf 2>/dev/null || echo "No qt.conf"
          echo ""
          echo "=== Qt Platform Plugins ==="
          ls -lh platforms/ 2>/dev/null || echo "No platforms/ directory"
          echo ""
          echo "=== Qt Style Plugins ==="
          ls -lh styles/ 2>/dev/null || echo "No styles/ directory"
          echo ""
          echo "=== Qt Image Format Plugins ==="
          ls -lh imageformats/ 2>/dev/null || echo "No imageformats/ directory"
          echo ""
          echo "=== Qt Icon Engine Plugins ==="
          ls -lh iconengines/ 2>/dev/null || echo "No iconengines/ directory"

      - name: Package with CPack
        id: cpack
        run: |
          cd build
          cpack -G ZIP
          cpack -G NSIS

          # List generated packages
          echo "Generated packages:"
          ls -la *.zip *.exe

      - name: Show NSIS log on CPack failure
        if: always() && steps.cpack.outcome == 'failure'
        run: |
          NSIS_DIR="build/_CPack_Packages/windows-x86-64/NSIS"
          echo "=== Listing ${NSIS_DIR} ==="
          ls -la "${NSIS_DIR}" 2>/dev/null || true
          if [ -f "${NSIS_DIR}/NSISOutput.log" ]; then
            echo "=== ${NSIS_DIR}/NSISOutput.log ==="
            cat "${NSIS_DIR}/NSISOutput.log"
          else
            echo "NSISOutput.log not found under ${NSIS_DIR}"
          fi

      - name: Sanity test - verify executable runs
        run: |
          cd build/staging
          echo "Testing pythonscad --info..."
          ./pythonscad.exe --info
          echo "Sanity test passed!"

      - name: Sanity test - verify bundled IPython is in staging tree
        run: |
          # Regression guard for pythonscad#621: the bundled IPython
          # must actually live in the CPack staging tree at the path
          # `bundledFallbackPaths` in src/python/pyopenscad.cc looks
          # for, otherwise --ipython falls back to "not installed" on
          # end users' machines. Fail fast in CI rather than discover
          # it post-release.
          BUNDLE_DIR="build/staging/lib/pythonscad-bundled-py"
          if [ ! -d "${BUNDLE_DIR}/IPython" ]; then
            echo "FAIL: ${BUNDLE_DIR}/IPython is missing -- the bundled" >&2
            echo "      IPython did not flow through cmake --install." >&2
            ls -la "${BUNDLE_DIR}" || true
            exit 1
          fi
          echo "Bundled IPython landed at ${BUNDLE_DIR}/IPython"

      - name: Prepare artifacts
        id: artifacts
        run: |
          mkdir -p artifacts

          # Copy ZIP files
          for f in build/*.zip; do
            if [ -f "$f" ] && [[ ! "$f" == *"-Installer.zip" ]]; then
              cp -v "$f" "artifacts/"
            fi
          done

          # Copy NSIS installer
          for f in build/*-Installer.exe; do
            if [ -f "$f" ]; then
              cp -v "$f" "artifacts/"
            fi
          done

          echo "Artifacts prepared:"
          ls -lh artifacts/

          # Set outputs using relative paths
          ZIP_FILE=$(ls artifacts/*.zip 2>/dev/null | head -1 || echo "")
          EXE_FILE=$(ls artifacts/*-Installer.exe 2>/dev/null | head -1 || echo "")

          if [ -n "$ZIP_FILE" ]; then
            echo "zip_path=$ZIP_FILE" >> $GITHUB_OUTPUT
            echo "zip_name=$(basename "$ZIP_FILE" .zip)" >> $GITHUB_OUTPUT
          fi

          if [ -n "$EXE_FILE" ]; then
            echo "exe_path=$EXE_FILE" >> $GITHUB_OUTPUT
            echo "exe_name=$(basename "$EXE_FILE" .exe)" >> $GITHUB_OUTPUT
          fi

      - name: Upload ZIP package
        if: steps.artifacts.outputs.zip_path != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifacts.outputs.zip_name }}
          path: ${{ steps.artifacts.outputs.zip_path }}
          retention-days: 30

      - name: Upload NSIS installer
        if: steps.artifacts.outputs.exe_path != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifacts.outputs.exe_name }}
          path: ${{ steps.artifacts.outputs.exe_path }}
          retention-days: 30

      # Build MSIX before the release upload so it can be included in the release assets.
      # The composite action handles: locating makeappx, generating AppxManifest.xml,
      # staging assets, packing, and optional code signing.
      # To enable code signing add secrets WINDOWS_SIGN_CERTIFICATE (base64 PFX) and
      # WINDOWS_SIGN_CERTIFICATE_PASSWORD to the repository, then uncomment the
      # sign-certificate-base64 / sign-certificate-password inputs below.
      - name: Derive MSIX filename (match CPack ZIP naming)
        id: msix-filename
        run: |
          # Extract the version string from the CPack ZIP so the MSIX filename
          # matches exactly (e.g. PythonSCAD-0.20.0-windows-x86-64.msix).
          ZIP=$(ls build/PythonSCAD-*.zip 2>/dev/null | grep -v Installer | head -1 || true)
          if [ -n "$ZIP" ]; then
            BASE=$(basename "$ZIP" .zip)      # PythonSCAD-0.20.0-windows-x86-64
          else
            BASE="PythonSCAD-snapshot-windows-x86-64"
          fi
          MSIX_NAME="${BASE}.msix"
          echo "msix_name=$MSIX_NAME" >> "$GITHUB_OUTPUT"
          echo "Using MSIX filename: $MSIX_NAME"

      # Determine the MSIX publisher DN.
      # When the CERTUM_CERTIFICATE_CN repository variable is set the real
      # certificate Subject DN is used so that signtool can sign the MSIX
      # after the build (the Identity Publisher must exactly match the signing
      # certificate's Subject DN).
      # Without the variable the unsigned-namespace OID placeholder is used,
      # which allows makeappx to produce a valid (unsigned) package.
      - name: Resolve MSIX publisher DN
        id: msix-publisher
        shell: bash
        env:
          CERTUM_DN: ${{ vars.CERTUM_CERTIFICATE_CN }}
        run: |
          if [ -n "$CERTUM_DN" ]; then
            CERTUM_DN_CLEAN="$(printf '%s' "$CERTUM_DN" | tr -d '\r\n')"
            echo "publisher_dn=$CERTUM_DN_CLEAN" >> "$GITHUB_OUTPUT"
            echo "Using real certificate DN for MSIX publisher."
          else
            PLACEHOLDER="CN=PythonSCAD, OID.2.25.311729368913984317654407730594956997722=1"
            echo "publisher_dn=$PLACEHOLDER" >> "$GITHUB_OUTPUT"
            echo "CERTUM_CERTIFICATE_CN variable not set — using unsigned placeholder DN."
          fi

      - name: Build MSIX package
        id: msix
        uses: ./.github/actions/build-msix
        with:
          staging-dir: build/staging
          executable-name: pythonscad.exe
          package-version: ${{ steps.msix-version.outputs.version }}
          publisher-cn: ${{ steps.msix-publisher.outputs.publisher_dn }}
          icon-source: resources/icons/pythonscad.png
          output-msix: ${{ steps.msix-filename.outputs.msix_name }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.msix-filename.outputs.msix_name }}
          path: ${{ steps.msix-filename.outputs.msix_name }}
          retention-days: 30

      - name: Upload artifacts to release
        if: github.event_name == 'release' || github.event.inputs.upload_to_release != ''
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            artifacts/*.zip
            artifacts/*.exe
            ${{ steps.msix-filename.outputs.msix_name }}
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.upload_to_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
