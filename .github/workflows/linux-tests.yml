name: Linux Experimental Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04 ]
        qt: [ qt5, qt6 ]
        exclude:
          - os: ubuntu-22.04
            # libqscintilla2-qt6-dev not packaged
            qt: qt6

    runs-on: ${{ matrix.os }}

    name: ${{ matrix.os }} ${{ matrix.qt }}

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: 'recursive'
        persist-credentials: false
    - name: Fetch tags for version detection
      run: |
        git fetch --unshallow --tags || git fetch --tags
        git describe --tags --always --dirty
    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Etc/UTC
      run: |
        which sudo || ( apt update && apt install -y sudo )
        sudo -E ./scripts/get-dependencies.py --yes --profile pythonscad-${{ matrix.qt }}
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
    - name: Install gcovr
      run: uv sync --frozen --project .github/ci/openscad-coverage
    - name: Install Python test dependencies (IPython + pexpect for --ipython tests)
      run: |
        # ipython and pexpect must be importable by the *system*
        # python3 because that is what the embedded interpreter
        # resolves at runtime. `--break-system-packages` is the
        # standard PEP 668 escape hatch on Ubuntu 24.04+; pre-PEP-668
        # runners just ignore it and install normally.
        #
        # IPython 9.x requires Python 3.11+. ubuntu-22.04 runners
        # still ship Python 3.10, so skip the IPython install there; the
        # --ipython smoke tests exercise the fallback REPL on that leg.
        # pexpect is installed unconditionally so ipython-pty can run.
        python3 -m pip install --break-system-packages --upgrade pip \
          || python3 -m pip install --upgrade pip
        if python3 -c 'import sys; sys.exit(0 if sys.version_info < (3, 11) else 1)'; then
          py_ver=$(python3 -c 'import sys; print("%d.%d" % (sys.version_info.major, sys.version_info.minor))')
          echo "SKIP: IPython 9.x requires Python 3.11+; this runner has ${py_ver}."
          echo "Installing pexpect only; --ipython tests will exercise the fallback REPL path."
          python3 -m pip install --break-system-packages --upgrade pexpect \
            || python3 -m pip install --upgrade pexpect
          exit 0
        fi
        python3 -m pip install --break-system-packages --upgrade 'ipython>=9,<10' pexpect \
          || python3 -m pip install --upgrade 'ipython>=9,<10' pexpect
    - name: Build and test
      run: ./scripts/github-ci.sh experimental enable_python enable_libfive ${{ matrix.qt }} build test coverage
    - name: Upload Test Result Report
      uses: actions/upload-artifact@v7
      if: ${{ always() }}
      with:
        name: Test Result Report (${{ matrix.os }} ${{ matrix.qt }})
        path: |
          b/Testing/Temporary/*_report.html
          b/Testing/Temporary/LastTest.log
          b/tests/output/svgviewbox*/*png
          tests/regression/svgviewbox*/*png
    - name: Upload Code Coverage Report
      uses: actions/upload-artifact@v7
      with:
        name: Code Coverage Report (${{ matrix.os }} ${{ matrix.qt }})
        path: c/coverage*.html
