# Build a representative PyPI wheel on pull requests to catch packaging regressions
# before release. The full multi-platform matrix runs in publish-to-pypi.yml.
name: Build PyPI wheels

on:
  push:
    branches:
      - master
    paths:
      - "setup.py"
      - "pyproject.toml"
      - "MANIFEST.in"
      - "scripts/cibuildwheel/**"
      - "scripts/smoke-test-pip.py"
      - "scripts/deps/profiles/pythonscad-pip.json"
      - "uv.lock"
      - ".github/workflows/build-pypi-wheels.yml"
  pull_request:
    paths:
      - "setup.py"
      - "pyproject.toml"
      - "MANIFEST.in"
      - "scripts/cibuildwheel/**"
      - "scripts/smoke-test-pip.py"
      - "scripts/deps/profiles/pythonscad-pip.json"
      - "uv.lock"
      - ".github/workflows/build-pypi-wheels.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel-smoke:
    name: cp312 manylinux x86_64 wheel + smoke test
    runs-on: ubuntu-24.04
    env:
      CIBW_BUILD: cp312-manylinux_x86_64
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Fetch tags for version detection
        run: |
          git fetch --unshallow --tags || git fetch --tags
          git describe --tags --always --dirty

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install build tooling
        run: uv sync --frozen --only-group build --no-install-project

      - name: Add build tools to PATH
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "${GITHUB_WORKSPACE}/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Build wheel
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0

      - uses: actions/upload-artifact@v7
        with:
          name: pypi-wheel-smoke
          path: wheelhouse/*.whl
