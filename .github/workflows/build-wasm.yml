name: Build WebAssembly

on:
  push:
    branches:
      - master
  pull_request:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Release tag to upload artifacts to (leave empty for CI-only build)'
        required: false
        default: ''
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled'
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test WebAssembly
    runs-on: ubuntu-latest
    # Keep least-privilege here: this job builds and executes untrusted
    # contributor code on pull_request runs, so it must never hold a
    # write-capable token. Release upload happens in the separate
    # upload-release job below.
    permissions:
      contents: read
    outputs:
      wasm_zip: ${{ steps.package.outputs.wasm_zip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          persist-credentials: false

      - name: Fetch tags for version detection
        run: |
          git fetch --unshallow --tags || git fetch --tags
          git describe --tags --always --dirty

      - name: Setup tmate session (debug)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          detached: true
          limit-access-to-actor: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build wasm-python-base Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/wasm/sysroot.dockerfile
          target: wasm-python-base
          tags: pythonscad-wasm-python-base:local
          load: true
          cache-from: type=gha,scope=wasm-docker
          cache-to: type=gha,mode=max,scope=wasm-docker

      - name: Build WASM node variant
        run: |
          docker run --rm -i \
            -v "$PWD:/src:rw" \
            -w /src \
            pythonscad-wasm-python-base:local \
            bash -c "
              set -euo pipefail
              emcmake cmake -B build-wasm-node \
                -DWASM_BUILD_TYPE=node \
                -DCMAKE_BUILD_TYPE=Release \
                -DEXPERIMENTAL=1 \
                -Wno-dev 2>&1 | tail -10
              cmake --build build-wasm-node -j\$(nproc) 2>&1 | tail -5
            "

      - name: Smoke test (node)
        run: |
          docker run --rm -i \
            -v "$PWD:/src:rw" \
            -v "$PWD/libraries/python:/cpython-wasm/lib/pythonscad/libraries/python:ro" \
            -w /src/build-wasm-node \
            pythonscad-wasm-python-base:local \
            bash -c "
              printf 'from openscad import *\nshow(difference(cube([20,20,20], center=True), cylinder(h=25, r=5, center=True)))\n' > /tmp/test.py
              node pythonscad.js -o /tmp/out.stl --trust-python /tmp/test.py
              SIZE=\$(wc -c < /tmp/out.stl)
              echo \"STL output: \${SIZE} bytes\"
              [ \"\${SIZE}\" -gt 1000 ] || { echo 'FAIL: STL too small or missing'; exit 1; }
              echo 'PASS'
            "

      - name: Build WASM web variant
        run: |
          docker run --rm -i \
            -v "$PWD:/src:rw" \
            -w /src \
            pythonscad-wasm-python-base:local \
            bash -c "
              set -euo pipefail
              emcmake cmake -B build-wasm-web \
                -DWASM_BUILD_TYPE=web \
                -DCMAKE_BUILD_TYPE=Release \
                -DEXPERIMENTAL=1 \
                -Wno-dev 2>&1 | tail -10
              cmake --build build-wasm-web -j\$(nproc) 2>&1 | tail -5
            "

      - name: Package web artifacts
        id: package
        run: |
          VERSION=$(git describe --tags --always)
          mkdir -p dist-wasm/wasm-test dist-wasm/vendor
          cp build-wasm-web/pythonscad.js \
             build-wasm-web/pythonscad.wasm \
             build-wasm-web/pythonscad.data \
             wasm-test/test.html \
             wasm-test/notebook.html \
             dist-wasm/
          cp wasm-test/vendor/three.module.min.js \
             wasm-test/vendor/three.core.min.js \
             dist-wasm/vendor/
          cp wasm-test/serve.py dist-wasm/wasm-test/
          cd dist-wasm
          zip -r "../pythonscad-${VERSION}-wasm.zip" .
          echo "wasm_zip=pythonscad-${VERSION}-wasm.zip" >> "$GITHUB_OUTPUT"

      - name: Upload WASM browser bundle
        uses: actions/upload-artifact@v7
        with:
          name: pythonscad-wasm-web
          path: dist-wasm/
          if-no-files-found: error

      - name: Upload WASM release zip
        uses: actions/upload-artifact@v7
        with:
          name: pythonscad-wasm-release-zip
          path: ${{ steps.package.outputs.wasm_zip }}
          if-no-files-found: error

  upload-release:
    name: Upload WASM bundle to release
    runs-on: ubuntu-latest
    needs: build-test
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release != '')
    # The write-capable token only lives in this job, which never runs on
    # pull_request events and does not build or execute repository code.
    permissions:
      contents: write  # for release asset upload

    steps:
      - name: Download WASM release zip
        uses: actions/download-artifact@v8
        with:
          name: pythonscad-wasm-release-zip

      - name: Upload WASM artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.upload_to_release }}
          GH_REPO: ${{ github.repository }}
          WASM_ZIP: ${{ needs.build-test.outputs.wasm_zip }}
        run: |
          gh release upload "$RELEASE_TAG" "$WASM_ZIP" \
            -R "$GH_REPO" --clobber

  deploy-playground:
    name: Deploy WASM playground to website
    runs-on: ubuntu-latest
    needs: build-test
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release != '')
    # No write-capable GitHub token here. Deployment is over SFTP using the same
    # pinned-host-key credentials as the website deploy. Never runs on
    # pull_request, so fork PRs cannot reach the secrets.
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate deploy configuration
        env:
          WEB_SFTP_SSH_KEY: ${{ secrets.WEB_SFTP_SSH_KEY }}
          WEB_SFTP_HOST_KEY: ${{ vars.WEB_SFTP_HOST_KEY }}
          WEB_SFTP_HOST: ${{ vars.WEB_SFTP_HOST }}
          WEB_SFTP_USER: ${{ vars.WEB_SFTP_USER }}
          WEB_SFTP_PATH: ${{ vars.WEB_SFTP_PATH }}
        run: |
          missing=""
          for var in WEB_SFTP_SSH_KEY WEB_SFTP_HOST_KEY \
                     WEB_SFTP_HOST WEB_SFTP_USER WEB_SFTP_PATH; do
            if [ -z "${!var}" ]; then
              missing="${missing} ${var}"
            fi
          done
          if [ -n "$missing" ]; then
            echo "Error: required deploy configuration is missing:${missing}" >&2
            echo "Populate them under Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - name: Download WASM web bundle
        uses: actions/download-artifact@v8
        with:
          name: pythonscad-wasm-web
          path: wasm-bundle

      - name: Assemble playground directory
        run: |
          set -euo pipefail
          mkdir -p playground/vendor playground/fonts
          # WASM binaries + runtime from the freshly built web bundle.
          cp wasm-bundle/pythonscad.js \
             wasm-bundle/pythonscad.wasm \
             wasm-bundle/pythonscad.data \
             playground/
          cp wasm-bundle/vendor/three.module.min.js \
             wasm-bundle/vendor/three.core.min.js \
             playground/vendor/
          # The notebook is the playground's landing page.
          cp wasm-bundle/notebook.html playground/index.html
          # Site code font (matches the rest of pythonscad.org) + Apache MIME
          # config so .wasm/.data are served with the right Content-Type.
          cp web/docs/fonts/IntelOneMono/IntelOneMono-Regular.woff2 playground/fonts/
          cp wasm-test/playground.htaccess playground/.htaccess
          ls -la playground playground/vendor playground/fonts

      - name: Setup SSH key and known_hosts for SFTP
        env:
          WEB_SFTP_SSH_KEY: ${{ secrets.WEB_SFTP_SSH_KEY }}
          WEB_SFTP_HOST_KEY: ${{ vars.WEB_SFTP_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$WEB_SFTP_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pin the deploy server's host key from the trusted repository
          # variable instead of TOFU-ing whatever answers at deploy time.
          if [ -z "$WEB_SFTP_HOST_KEY" ]; then
            echo "Error: WEB_SFTP_HOST_KEY repository variable is unset." >&2
            exit 1
          fi
          printf '%s\n' "$WEB_SFTP_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy playground to SFTP server
        env:
          WEB_SFTP_PORT: ${{ vars.WEB_SFTP_PORT }}
          VARS_WEB_SFTP_USER: ${{ vars.WEB_SFTP_USER }}
          VARS_WEB_SFTP_HOST: ${{ vars.WEB_SFTP_HOST }}
          VARS_WEB_SFTP_PATH: ${{ vars.WEB_SFTP_PATH }}
        run: |
          PORT="${WEB_SFTP_PORT:-22}"
          # --delete is scoped to the /playground/ subtree only (we sync into
          # .../playground/), so it cleans stale playground files without
          # touching the rest of the site. The website deploy in turn excludes
          # /playground/ from its own --delete.
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT" \
            playground/ \
            "${VARS_WEB_SFTP_USER}@${VARS_WEB_SFTP_HOST}:${VARS_WEB_SFTP_PATH}/playground/"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
