# Builds binary wheels and a source distribution, then publishes all artifacts to PyPI.
# Triggered when a GitHub Release is fully published (not prerelease).
#
# Prerequisites (one-time setup):
#   1. Create the "pythonscad" project on PyPI (https://pypi.org)
#   2. Configure "trusted publishing" for this repository under:
#      PyPI project settings -> Publishing -> Add a new publisher
#      - Owner: pythonscad
#      - Repository: pythonscad
#      - Workflow name: publish-to-pypi.yml
#      - Environment name: pypi
name: Publish to PyPI

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: macos-15-intel
          - os: macos-15
          - os: windows-2022
    steps:
      - run: |
          git config --global submodule.fetchJobs 8
          git config --global core.longpaths true

      - uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Fetch tags for version detection
        run: |
          git fetch --unshallow --tags || git fetch --tags
          git describe --tags --always --dirty

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install build tooling
        run: uv sync --frozen --only-group build --no-install-project

      - name: Add build tools to PATH
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "${GITHUB_WORKSPACE}/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0

      - uses: actions/upload-artifact@v7
        with:
          name: pypi-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Fetch tags for version detection
        run: |
          git fetch --unshallow --tags || git fetch --tags
          git describe --tags --always --dirty

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install build frontend
        run: uv sync --frozen --only-group build --no-install-project

      - name: Build sdist
        run: uv run --no-sync python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: pypi-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: pypi-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
