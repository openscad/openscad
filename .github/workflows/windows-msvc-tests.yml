name: Windows(MSVC) Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false
jobs:
  build-and-test:
    name: windows-latest msvc
    runs-on: windows-latest
    permissions:
      actions: write
      contents: read
    env:
      GALLIUM_DRIVER: llvmpipe
      LIBGL_ALWAYS_SOFTWARE: '1'
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        include:
          - build_type: Release
            cmake_preset: windows-msvc-release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: System Information (for debugging)
        shell: powershell
        run: |
          Write-Output "=== Windows Version ==="
          (Get-CimInstance Win32_OperatingSystem).Caption
          (Get-CimInstance Win32_OperatingSystem).Version
          (Get-CimInstance Win32_OperatingSystem).BuildNumber
          Write-Output "=== CPU Info ==="
          $cpu = Get-CimInstance Win32_Processor
          $cpu.Name
          $cpu.Caption
          $cpu.NumberOfCores
          $cpu.NumberOfLogicalProcessors
          Write-Output "=== Memory ==="
          $mem = Get-CimInstance Win32_ComputerSystem
          "$([math]::Round($mem.TotalPhysicalMemory/1GB, 2)) GB"
          Write-Output "=== Environment ==="
          Write-Output "Runner: $env:RUNNER_OS $env:RUNNER_ARCH"
          Write-Output "Image: $env:ImageOS $env:ImageVersion"

      - name: Enable Windows Error Reporting crash dumps
        shell: powershell
        run: |
          # Enable local crash dumps for all applications
          $dumpFolder = "${{ github.workspace }}\CrashDumps"
          New-Item -ItemType Directory -Force -Path $dumpFolder
          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps"
          if (-not (Test-Path $regPath)) {
            New-Item -Path $regPath -Force
          }
          Set-ItemProperty -Path $regPath -Name "DumpFolder" -Value $dumpFolder -Type ExpandString
          Set-ItemProperty -Path $regPath -Name "DumpType" -Value 2 -Type DWord  # Full dump
          Set-ItemProperty -Path $regPath -Name "DumpCount" -Value 10 -Type DWord
          Write-Output "Crash dumps will be saved to: $dumpFolder"

      - name: Debug - Setup tmate session (7 min timeout)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 7
        with:
          limit-access-to-actor: true
          detached: true
      - name: Setup Visual Studio Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat qtmultimedia'
          cache: true

      - name: Restore QScintilla cache
        id: qscintilla-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.QT_ROOT_DIR }}/lib/qscintilla2_qt6.lib
            ${{ env.QT_ROOT_DIR }}/lib/qscintilla2_qt6.dll
            ${{ env.QT_ROOT_DIR }}/include/Qsci
          key: qscintilla-${{ runner.os }}-2.14.1-qt6.10.0-v2

      - name: Build QScintilla from source
        if: steps.qscintilla-cache.outputs.cache-hit != 'true'
        run: |
          echo === Downloading QScintilla ===
          curl -L -o qscintilla.tar.gz https://www.riverbankcomputing.com/static/Downloads/QScintilla/2.14.1/QScintilla_src-2.14.1.tar.gz
          tar -xzf qscintilla.tar.gz
          cd QScintilla_src-2.14.1\src
          echo.
          echo === Building QScintilla ===
          qmake qscintilla.pro
          nmake
          echo.
          echo === Installing QScintilla ===
          nmake install
          echo SUCCESS: QScintilla built and installed!
        shell: cmd

      - name: Cleanup QScintilla build artifacts
        if: steps.qscintilla-cache.outputs.cache-hit != 'true'
        run: |
          echo Cleaning up QScintilla build artifacts to reduce cache size...
          rm -rf QScintilla_src-2.14.1
          rm -f qscintilla.tar.gz
          echo Cleanup complete
        shell: bash

      - name: Save QScintilla cache
        if: steps.qscintilla-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.QT_ROOT_DIR }}/lib/qscintilla2_qt6.lib
            ${{ env.QT_ROOT_DIR }}/lib/qscintilla2_qt6.dll
            ${{ env.QT_ROOT_DIR }}/include/Qsci
          key: ${{ steps.qscintilla-cache.outputs.cache-primary-key }}

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: false

      - name: Install flex, bison, and ghostscript via pacman
        run: /c/msys64/usr/bin/pacman -Sy --noconfirm flex bison mingw-w64-x86_64-ghostscript
        shell: bash

      - name: Add MSYS2 to PATH
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add MinGW64 to PATH (for ghostscript)
        run: echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
        shell: bash

      - name: Create bsdtar symlink
        run: |
          mklink "C:\Program Files\Git\usr\bin\bsdtar.exe" "C:\Windows\System32\tar.exe" || echo bsdtar symlink already exists
        shell: cmd
        continue-on-error: true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bsdiff4 numpy pillow
        shell: cmd

      - name: Install Mesa for software OpenGL rendering
        uses: ssciwr/setup-mesa-dist-win@v2
        with:
          version: '24.2.3'
          build-type: 'release-msvc'

      - name: Read vcpkg baseline from vcpkg.json
        id: vcpkg-baseline
        run: echo "commit-id=$(jq -r '.["builtin-baseline"]' vcpkg.json)" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ steps.vcpkg-baseline.outputs.commit-id }}'
          vcpkgJsonGlob: '**/vcpkg.json'
          runVcpkgInstall: false

      - name: Restore vcpkg installed cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}/build/${{ matrix.cmake_preset }}/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('vcpkg-configuration.json', '.git/modules/vcpkg/HEAD') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-

      - name: Configure CMake (initial - tests disabled)
        shell: bash
        run: |
          cmake --preset windows-msvc-release -DENABLE_TESTS=OFF

      - name: Reconfigure CMake with vcpkg Python for tests
        shell: bash
        run: |
          vcpkg_python_dir="${{ github.workspace }}/build/windows-msvc-release/vcpkg_installed/x64-windows/tools/python3"
          if [ -f "$vcpkg_python_dir/python.exe" ]; then
            echo "Found vcpkg Python at: $vcpkg_python_dir/python.exe"
            python_version=$("$vcpkg_python_dir/python.exe" --version)
            echo "vcpkg Python version: $python_version"
            cmake --preset windows-msvc-release \
              -DENABLE_TESTS=ON \
              -DPython3_ROOT_DIR="$vcpkg_python_dir" \
              -DPython3_EXECUTABLE="$vcpkg_python_dir/python.exe"
          else
            echo "ERROR: vcpkg Python not found at $vcpkg_python_dir/python.exe"
            exit 1
          fi

      - name: Cleanup vcpkg build artifacts before caching
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "Cleaning up vcpkg build artifacts to reduce cache size..."
          for dir in buildtrees downloads packages; do
            if [ -d "${{ github.workspace }}/vcpkg/$dir" ]; then
              echo "  Removing vcpkg/$dir..."
              rm -rf "${{ github.workspace }}/vcpkg/$dir"
            fi
          done
          echo "Cleanup complete"

      - name: Save vcpkg installed cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/build/${{ matrix.cmake_preset }}/vcpkg_installed
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Add Qt6 and vcpkg DLLs to PATH for build and tests
        shell: bash
        run: |
          echo "Adding Qt6 and vcpkg bin directories to PATH..."
          echo "${{ env.QT_ROOT_DIR }}/bin" >> $GITHUB_PATH
          echo "${{ env.QT_ROOT_DIR }}/lib" >> $GITHUB_PATH
          echo "${{ github.workspace }}/build/${{ matrix.cmake_preset }}/vcpkg_installed/x64-windows/bin" >> $GITHUB_PATH
          echo "PATH updated for subsequent steps"

      - name: Debug - vcpkg installed state before build
        shell: bash
        run: |
          echo "=== vcpkg_installed contents (build dir) ==="
          vcpkg_installed="${{ github.workspace }}/build/windows-msvc-release/vcpkg_installed/x64-windows"
          if [ -d "$vcpkg_installed/bin" ]; then
            echo "DLL count: $(ls "$vcpkg_installed/bin"/*.dll 2>/dev/null | wc -l)"
            echo "Sample DLLs:"
            ls "$vcpkg_installed/bin"/*.dll 2>/dev/null | head -20
          else
            echo "WARNING: $vcpkg_installed/bin does NOT exist"
          fi
          echo ""
          echo "=== Searching for mpfr*.dll anywhere under workspace ==="
          find "${{ github.workspace }}" -name "mpfr*.dll" -type f 2>/dev/null || echo "No mpfr DLL found"

      - name: Build with CMake
        uses: lukka/run-cmake@v10
        with:
          buildPreset: 'windows-msvc-release'

      - name: Debug - post-build DLL and dependency state
        if: always()
        shell: cmd
        run: |
          echo === DLLs in Release directory ===
          dir /B "${{ github.workspace }}\build\windows-msvc-release\Release\*.dll" 2>nul | find /c ".dll"
          echo.
          echo === OpenSCADUnitTests.exe dependencies ===
          dumpbin /dependents "${{ github.workspace }}\build\windows-msvc-release\Release\OpenSCADUnitTests.exe" 2>nul || echo "OpenSCADUnitTests.exe not found or dumpbin failed"
          echo.
          echo === Searching for mpfr*.dll under workspace ===
          dir /S /B "${{ github.workspace }}\mpfr*.dll" 2>nul || echo "No mpfr DLL found"

      - name: Copy Qt and dependency DLLs next to executables
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_dir="${{ github.workspace }}/build/${{ matrix.cmake_preset }}/Release"
          qt_bin_dir="${{ env.QT_ROOT_DIR }}/bin"
          qt_lib_dir="${{ env.QT_ROOT_DIR }}/lib"
          vcpkg_bin_dir="${{ github.workspace }}/build/${{ matrix.cmake_preset }}/vcpkg_installed/x64-windows/bin"

          mkdir -p "$release_dir"

          if [ -f "${qt_lib_dir}/qscintilla2_qt6.dll" ]; then
            cp "${qt_lib_dir}/qscintilla2_qt6.dll" "$release_dir/"
          fi

          for dll in "${qt_bin_dir}"/*.dll; do
            cp "$dll" "$release_dir/"
          done

          if [ -d "$vcpkg_bin_dir" ]; then
            for dll in "${vcpkg_bin_dir}"/*.dll; do
              cp "$dll" "$release_dir/"
            done
          fi

          echo "Copied runtime DLLs into $release_dir"

      - name: Configure error handling for tests
        shell: powershell
        run: |
          $setErrorModeSource = @"
          using System;
          using System.Runtime.InteropServices;

          public class ErrorMode {
              [DllImport("kernel32.dll")]
              public static extern uint SetErrorMode(uint uMode);
          }
          "@

          Add-Type -TypeDefinition $setErrorModeSource
          # SEM_FAILCRITICALERRORS (0x0001) | SEM_NOGPFAULTERRORBOX (0x0002) | SEM_NOOPENFILEERRORBOX (0x8000)
          $flags = 0x0001 -bor 0x0002 -bor 0x8000
          $oldMode = [ErrorMode]::SetErrorMode($flags)
          Write-Host "Error mode set to 0x$($flags.ToString('X4')) to suppress crash dialogs (was: 0x$($oldMode.ToString('X4')))"

      - name: Debug - Run single failing test with verbose output
        shell: bash
        continue-on-error: true
        run: |
          cd build/windows-msvc-release
          echo "=== Running single CGAL test with verbose output for debugging ==="
          echo "=== Test: render-cgal_sphere-tests ==="
          # Run a single known-failing test with maximum verbosity
          ctest -C Release -R "render-cgal_sphere-tests" -V --output-on-failure --timeout 120 || true
          echo ""
          echo "=== Exit code: $? ==="
          echo "=== Checking for crash dumps ==="
          ls -la "${{ github.workspace }}/CrashDumps/" 2>/dev/null || echo "No crash dumps directory"

      - name: Run Tests
        shell: bash
        run: |
          cd build/windows-msvc-release
          # CMake is configured to use vcpkg's Python, so no env vars needed
          ctest -C Release -L Default -j2 --output-on-failure

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Results (Windows MSVC ${{ matrix.build_type }})
          path: |
            build/${{ matrix.cmake_preset }}/Testing/Temporary/*_report.html
            build/${{ matrix.cmake_preset }}/Testing/Temporary/LastTest.log
          if-no-files-found: warn

      - name: Upload CMake Cache and Build Info for Debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-and-build-info-${{ matrix.build_type }}
          path: |
            build/${{ matrix.cmake_preset }}/CMakeCache.txt
            build/${{ matrix.cmake_preset }}/CMakeFiles/*.log
            build/${{ matrix.cmake_preset }}/OpenSCADLibInternal.vcxproj
            build/${{ matrix.cmake_preset }}/compile_commands.json
          if-no-files-found: warn

      - name: Upload Crash Dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-dumps-${{ matrix.build_type }}
          path: |
            ${{ github.workspace }}/CrashDumps/
          if-no-files-found: ignore

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openscad-windows-msvc-${{ matrix.build_type }}
          path: |
            build/${{ matrix.cmake_preset }}/Release/openscad.exe
          if-no-files-found: error
