name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: To Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: code-reproducing
    attributes:
      label: Code reproducing the issue
      description: If applicable, add trimmed down, self-contained code demonstrating the issue.
      render: python

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: textarea
    id: environment-version
    attributes:
      label: Environment and Version info
      description: |
        - OS [e.g. Windows 10, macOS 12 Monterey, Ubuntu 22.04]
        - System [e.g. Intel PC 64-bit, Raspberry PI 4]
        - PythonSCAD Version [e.g. 0.0.1, 0.1.0, etc., and where it was installed from]
    validations:
      required: true

  - type: textarea
    id: library-graphics-info
    attributes:
      label: Library & Graphics card information
      description: Content of Help → Library Info, or output of `pythonscad --info`. If you used Help → Report issue..., paste from your clipboard.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.

  - type: markdown
    attributes:
      value: |
        <!-- If you want to assign this issue to yourself, write /assign-me on its own line -->
